name: update-dashboard-data

on:
  workflow_dispatch:
  schedule:
    - cron: '15 13 * * 1-5'

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Placeholder update step
        run: |
          echo "Add scripts here to refresh JSON datasets."
          echo "Examples:"
          echo "python scripts/update_unemployment.py"
          echo "python scripts/update_fed.py"
          echo "python scripts/update_gas.py"

      - name: Commit updated data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Update dashboard data"
          git push
