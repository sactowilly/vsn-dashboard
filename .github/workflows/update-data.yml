name: update-dashboard-data

on:
  workflow_dispatch:
  schedule:
    - cron: '20 13 * * 1-5'

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    env:
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
      FRED_SACRAMENTO_UR_SERIES_ID: ${{ secrets.FRED_SACRAMENTO_UR_SERIES_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          python -m pip install --upgrade pip
          pip install requests
      - run: python scripts/update_unemployment.py
      - run: python scripts/update_fed.py
      - run: python scripts/update_gas.py
      - run: python scripts/update_disasters.py
      - run: python scripts/update_build_meta.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Update dashboard data"
          git push
