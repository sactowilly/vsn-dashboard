<!doctype html>
<html><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sacramento Packaging Dashboard</title>
<link rel="stylesheet" href="style.css">
</head><body>
<div class="wrap">
<header class="top">
  <div><div class="logo">SD</div></div>
  <div><h1>Sacramento Packaging Dashboard</h1><p>Management market and risk monitor</p></div>
  <div class="meta"><div>Local Time<br><strong id="clockDisplay">--:--</strong></div><div>Published Data<br><strong id="globalLastUpdated">Loading...</strong></div></div>
  <button id="refreshButton">Reload Latest Published Data</button>
</header>
<section class="overview"><h2>Executive Overview</h2><p id="overviewSummary">Loading dashboard datasets...</p></section>
<section id="tileGrid" class="grid"></section>
<div id="detailDrawer" class="drawer"><div id="detailOverlay" class="overlay"></div><aside class="panel"><button id="detailCloseButton">×</button><div id="detailContent">Select a tile to view details.</div></aside></div>
<div id="statusToast" class="toast"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body></html>
